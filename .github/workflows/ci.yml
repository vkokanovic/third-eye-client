name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Lint — format check + clippy pedantic (ubuntu only, fast)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libx11-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig-dev libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev pkg-config build-essential

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (pedantic)
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -D warnings

  # ---------------------------------------------------------------------------
  # Test — cargo nextest on macOS, Windows, Linux
  # ---------------------------------------------------------------------------
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS
          - os: windows-2025-vs2026
            name: Windows
          - os: ubuntu-latest
            name: Linux
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libx11-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig-dev libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev pkg-config build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: cargo nextest run
        run: cargo nextest run

  # ---------------------------------------------------------------------------
  # Coverage — llvm-cov on ubuntu, upload lcov artifact
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libx11-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig-dev libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev pkg-config build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"

      - name: Install tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
          cargo install cargo-nextest --locked

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info nextest

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
